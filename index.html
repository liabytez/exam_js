<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Hiragana</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header>
        <h1>Prueba JavaScript</h1>
        <p>Lenguaje de Marcas - Hailie Mountain</p>
    </header>

    <section class="main">
        <p id="contador">Imagen 1 de 10 (10 Aleatorias)</p>
        <div class="img">
            <img src="assets/a.jpg" id="imagen" alt="">
        </div>
        <form id="form" autocomplete="off">
            <div class="input">
                <input type="text" id="respuesta" required placeholder="Escribe el nombre de la imagen actual" />
                <button type="submit" class="primary" id="btnComprobar">Comprobar</button>
                <button type="button" class="secondary" id="btnResetear">Resetear</button>
            </div>
        </form>
        <p id="mensajeTerminado"></p>
    </section>
    <section class="main">
        <h1>Resumen</h1>
        <div class="resumen">
            <div class="card">
                <p>Aciertos</p>
                <p class="bold" id="aciertos">0</p>
            </div>
            <div class="card">
                <p>Fallos</p>
                <p class="bold" id="fallos">0</p>
            </div>
            <div class="card">
                <p>Intentos</p>
                <p class="bold" id="intentos">0</p>
            </div>
            <div class="card">
                <p>Pendientes</p>
                <p class="bold" id="pendientes">0</p>
            </div>
        </div>
        <h2>Historial de respuestas</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Respuesta escrita</th>
                    <th>Resultado</th>
                </tr>
            </thead>
            <tbody id="tbodyRespuestas">
                <!-- Se rellenará la tabla con JS -->
            </tbody>
        </table>
    </section>

    <script type="module" src="js/app.js"></script>
</body>

</html>
